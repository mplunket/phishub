name: "🐛 Bug report"
description: Something in the Phishub beta isn't working the way you expected.
title: "[Bug]: "
labels: ["bug", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping test Phishub! Please fill out as much as you can —
        it makes bugs much faster to track down.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I added a tab to "Sand", the page showed an error instead of saving.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen again?
      placeholder: |
        1. Go to the song page for ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Where in the app?
      options:
        - Tabs / chords
        - Songs
        - Videos
        - Setlists
        - Favorites
        - Comments
        - Sign in / sign up / profile
        - Other / not sure
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device & browser
      placeholder: iPhone 15, Safari · or · Windows, Chrome
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop any screenshots here (optional).
    validations:
      required: false
